# Skaffold configuration for local Kubernetes development
# Run: skaffold dev
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: openidx

# Build configuration
build:
  artifacts:
    # Go microservices
    - image: openidx/identity-service
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.identity-service
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/identity-service/**/*.go
            dest: .
          - src: internal/identity/**/*.go
            dest: .

    - image: openidx/governance-service
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.governance-service
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/governance-service/**/*.go
            dest: .
          - src: internal/governance/**/*.go
            dest: .

    - image: openidx/provisioning-service
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.provisioning-service
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/provisioning-service/**/*.go
            dest: .
          - src: internal/provisioning/**/*.go
            dest: .

    - image: openidx/audit-service
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.audit-service
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/audit-service/**/*.go
            dest: .
          - src: internal/audit/**/*.go
            dest: .

    - image: openidx/admin-api
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.admin-api
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/admin-api/**/*.go
            dest: .
          - src: internal/admin/**/*.go
            dest: .

    - image: openidx/oauth-service
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.oauth-service
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/oauth-service/**/*.go
            dest: .
          - src: internal/oauth/**/*.go
            dest: .

    - image: openidx/gateway-service
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.gateway-service
        buildArgs:
          VERSION: dev
      sync:
        manual:
          - src: cmd/gateway-service/**/*.go
            dest: .
          - src: internal/gateway/**/*.go
            dest: .

    # Admin Console (React/Vite)
    - image: openidx/admin-console
      context: .
      docker:
        dockerfile: deployments/docker/Dockerfile.admin-console
      sync:
        manual:
          - src: web/admin-console/src/**/*.*
            dest: /app/src
          - src: web/admin-console/index.html
            dest: /app
          - src: web/admin-console/package.json
            dest: /app

  # For local development, use kind cluster's internal registry
  local:
    push: false

# Deploy configuration
deploy:
  kubectl: {}

# Port forwarding
portForward:
  resourceType: service
  forward:
    - labelSelector: app.kubernetes.io/name=identity-service
      localPort: 8001
      port: 8001
    - labelSelector: app.kubernetes.io/name=governance-service
      localPort: 8002
      port: 8002
    - labelSelector: app.kubernetes.io/name=provisioning-service
      localPort: 8003
      port: 8003
    - labelSelector: app.kubernetes.io/name=audit-service
      localPort: 8004
      port: 8004
    - labelSelector: app.kubernetes.io/name=admin-api
      localPort: 8005
      port: 8005
    - labelSelector: app.kubernetes.io/name=oauth-service
      localPort: 8006
      port: 8006
    - labelSelector: app.kubernetes.io/name=gateway-service
      localPort: 8080
      port: 8080
    - labelSelector: app.kubernetes.io/name=admin-console
      localPort: 3000
      port: 3000
    - labelSelector: app.kubernetes.io/component=postgres
      localPort: 5432
      port: 5432
    - labelSelector: app.kubernetes.io/component=redis
      localPort: 6379
      port: 6379
    - labelSelector: app.kubernetes.io/component=elasticsearch
      localPort: 9200
      port: 9200
    - labelSelector: app.kubernetes.io/component=opa
      localPort: 8281
      port: 8281
    - labelSelector: app.kubernetes.io/name=apisix
      localPort: 9080
      port: 9080
    - labelSelector: app.kubernetes.io/name=apisix
      localPort: 9180
      port: 9180

# Configuration profiles
profiles:
  # Development profile - hot reload enabled
  - name: dev
    patches:
      - op: replace
        path: /build/artifacts/0/docker/target
        value: openidx-dev/identity-service
      - op: replace
        path: /build/artifacts/1/docker/target
        value: openidx-dev/governance-service
      - op: replace
        path: /build/artifacts/2/docker/target
        value: openidx-dev/provisioning-service
      - op: replace
        path: /build/artifacts/3/docker/target
        value: openidx-dev/audit-service
      - op: replace
        path: /build/artifacts/4/docker/target
        value: openidx-dev/admin-api
      - op: replace
        path: /build/artifacts/5/docker/target
        value: openidx-dev/oauth-service
      - op: replace
        path: /build/artifacts/6/docker/target
        value: openidx-dev/gateway-service
      - op: replace
        path: /build/artifacts/7/docker/target
        value: openidx-dev/admin-console
