ShortDescription: OpenIDX Windows client — device-trust agent + SSO/PAM tray.
Description: >-
  The OpenIDX Windows client is a single lightweight binary that runs as both a
  background Windows service (device enrollment, endpoint posture reporting, and
  OpenZiti connectivity) and a system-tray app (browser-based PKCE single sign-on
  with MFA, and one-click launch of brokered privileged-access sessions). It is
  deployable at scale via GPO or Intune and updates itself from signed releases.
