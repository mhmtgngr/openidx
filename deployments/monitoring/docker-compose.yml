# Minimal opt-in observability stack for the OpenIDX box: Prometheus (metrics +
# SLO alerts), Grafana (dashboards), and an OTel collector that receives the
# services' already-wired OTLP traces. Host-networked so it can scrape the
# services on 127.0.0.1:8001-8008 without extra plumbing.
#
#   podman compose -f deployments/monitoring/docker-compose.yml up -d
#
# Then, to activate tracing, set on each service (e.g. common.env / run-access.sh):
#   OTEL_EXPORTER_OTLP_ENDPOINT=127.0.0.1:4317
# and restart. Metrics need no code/env change — they're already exported.
services:
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: oidx-prometheus
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro,Z
      - oidx_prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.listen-address=127.0.0.1:9090

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: oidx-grafana
    network_mode: host
    restart: unless-stopped
    environment:
      - GF_SERVER_HTTP_ADDR=127.0.0.1
      - GF_SERVER_HTTP_PORT=3001
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - oidx_grafana_data:/var/lib/grafana

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    container_name: oidx-otel-collector
    network_mode: host
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro,Z

volumes:
  oidx_prometheus_data:
  oidx_grafana_data:
