# Prometheus scrape config for the OpenIDX box.
# Every service already exposes /metrics (openidx_* RED metrics + process/DB
# gauges). Run alongside the box (see deployments/monitoring/README.md).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: openidx
    metrics_path: /metrics
    static_configs:
      - targets:
          - 127.0.0.1:8001   # identity
          - 127.0.0.1:8002   # governance
          - 127.0.0.1:8003   # provisioning
          - 127.0.0.1:8004   # audit
          - 127.0.0.1:8005   # admin-api
          - 127.0.0.1:8006   # oauth
          - 127.0.0.1:8007   # access
          - 127.0.0.1:8008   # gateway
        labels:
          env: box

  # APISIX exposes its own Prometheus metrics (edge RPS, latency, upstream health).
  - job_name: apisix
    metrics_path: /apisix/prometheus/metrics
    static_configs:
      - targets: ['127.0.0.1:9091']
