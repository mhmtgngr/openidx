apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openidx.fullname" . }}-config
  labels:
    {{- include "openidx.labels" . | nindent 4 }}
data:
  KEYCLOAK_URL: {{ .Values.config.keycloakUrl | default "http://keycloak:8180" | quote }}
  OPA_URL: {{ .Values.config.opaUrl | default "http://opa:8281" | quote }}
  ELASTICSEARCH_URL: {{ .Values.config.elasticsearchUrl | default "http://elasticsearch:9200" | quote }}
  OAUTH_ISSUER: {{ .Values.config.oauthIssuer | default "http://oauth-service:8006" | quote }}
  OAUTH_JWKS_URL: {{ .Values.config.oauthJwksUrl | default "http://oauth-service:8006/.well-known/jwks.json" | quote }}
  VITE_API_URL: {{ .Values.config.viteApiUrl | default "https://api.openidx.io" | quote }}
  VITE_OAUTH_URL: {{ .Values.config.viteOauthUrl | default "https://auth.openidx.io" | quote }}
  VITE_OAUTH_CLIENT_ID: {{ .Values.config.viteOauthClientId | default "admin-console" | quote }}
  # Multi-tenancy (v1.6+). TENANT_BASE_DOMAIN enables per-tenant subdomain/issuer
  # resolution. DEFAULT_ORG_FALLBACK MUST stay false for multi-tenant installs
  # (single-tenant installs set it true). See docs/v2-multitenancy-design.md.
  TENANT_BASE_DOMAIN: {{ .Values.config.tenantBaseDomain | default "" | quote }}
  DEFAULT_ORG_FALLBACK: {{ .Values.config.defaultOrgFallback | default false | quote }}
  DEFAULT_ORG_ID: {{ .Values.config.defaultOrgId | default "00000000-0000-0000-0000-000000000010" | quote }}
  # PostgreSQL TLS mode. Services with APP_ENV=production refuse to start when
  # this is 'disable' — production must set 'require' or stronger.
  DATABASE_SSL_MODE: {{ .Values.database.sslMode | default "disable" | quote }}
  {{- if .Values.database.connectTimeout }}
  # Bound a single dial so a DB failover fails fast and the pool re-dials the
  # promoted primary instead of hanging (in-code default 5s when unset).
  DB_CONNECT_TIMEOUT: {{ .Values.database.connectTimeout | quote }}
  {{- end }}
  {{- if .Values.database.statementTimeout }}
  # Server-side per-statement cap so a query stuck on a degraded primary can't
  # pin a connection indefinitely (in-code default: off when unset).
  DB_STATEMENT_TIMEOUT: {{ .Values.database.statementTimeout | quote }}
  {{- end }}
