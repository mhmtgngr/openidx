# OpenIDX Helm Chart Values

nameOverride: ""
fullnameOverride: ""

# ----- Secrets -----
# Provide values here for development/testing only.
# For production, use externalSecrets (below) or --set flags.
secrets:
  postgresPassword: ""      # REQUIRED
  redisPassword: ""          # REQUIRED
  jwtSecret: ""              # REQUIRED - min 32 chars
  encryptionKey: ""          # REQUIRED - exactly 32 bytes
  keycloakAdminPassword: ""
  smtpPassword: ""
  # PAM dedicated brokers (pamBroker.enabled). REST admin credentials for the
  # direct + ziti Guacamole brokers, and the brokers' Postgres password.
  guacamoleAdminPassword: ""
  guacamoleZitiAdminPassword: ""
  pamGuacDbPassword: ""

# ----- External Secrets Operator -----
# Enable this to pull secrets from AWS Secrets Manager, HashiCorp Vault, etc.
externalSecrets:
  enabled: false
  refreshInterval: "1h"
  secretStoreRef:
    name: ""
    kind: ClusterSecretStore
  remoteKeyPrefix: "openidx"

global:
  # Image namespace. Matches the GHCR pipeline in .github/workflows/docker.yml
  # which publishes ghcr.io/mhmtgngr/openidx/<service>.
  imageRegistry: ghcr.io/mhmtgngr/openidx
  imagePullSecrets: []
  storageClass: ""
  environment: "production"
  logLevel: "info"

# ----- Service URLs (ConfigMap) -----
config:
  keycloakUrl: "http://keycloak:8180"
  opaUrl: "http://opa:8281"
  elasticsearchUrl: "http://elasticsearch:9200"
  oauthIssuer: "https://auth.openidx.io"
  oauthJwksUrl: "http://oauth-service:8006/.well-known/jwks.json"
  viteApiUrl: "https://api.openidx.io"
  viteOauthUrl: "https://auth.openidx.io"
  viteOauthClientId: "admin-console"
  # Multi-tenancy. Leave tenantBaseDomain empty for single-tenant installs (and
  # set defaultOrgFallback: true). Multi-tenant installs set the base domain and
  # keep defaultOrgFallback: false so unresolved requests fail closed.
  tenantBaseDomain: ""
  defaultOrgFallback: true
  defaultOrgId: "00000000-0000-0000-0000-000000000010"

# Identity Service
identityService:
  enabled: true
  replicaCount: 2
  image:
    repository: identity-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8001
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Governance Service
governanceService:
  enabled: true
  replicaCount: 2
  image:
    repository: governance-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8002
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Provisioning Service
provisioningService:
  enabled: true
  replicaCount: 2
  image:
    repository: provisioning-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8003
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Audit Service
auditService:
  enabled: true
  replicaCount: 2
  image:
    repository: audit-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8004
  # WebSocket origin validation for audit stream
  # Controls which origins can connect to the real-time audit event stream
  # Prevents Cross-Site WebSocket Hijacking (CSWSH) attacks
  allowedOrigins: []
  # Examples:
  #   allowedOrigins:
  #     - https://admin.example.com
  #     - https://audit.example.com
  #   allowedOrigins:
  #     - https://*.example.com  # Wildcard subdomain
  # When empty (default), enforces same-origin policy
  enableSecurityLogging: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Admin API
adminApi:
  enabled: true
  replicaCount: 2
  image:
    repository: admin-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8005
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# OAuth/OIDC Service
oauthService:
  enabled: true
  replicaCount: 2
  image:
    repository: oauth-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8006
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Gateway Service
gatewayService:
  enabled: true
  replicaCount: 2
  image:
    repository: gateway-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8008
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Access Service
accessService:
  enabled: true
  replicaCount: 2
  image:
    repository: access-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8007
  # Ziti (OpenZiti) configuration for zero-trust network access
  ziti:
    enabled: true
    ctrlUrl: ""
    # If set, mount this Secret as the Ziti identity directory (/ziti).
    # When empty an emptyDir is used (suitable for dynamic enrollment).
    identitySecret: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# PAM dedicated session brokers (two Guacamole stacks + a ziti-tunnel sidecar +
# a shared recordings PVC). Disabled by default; enable to make brokered PAM
# RDP/SSH/VNC launches work. When enabled, the access-service Deployment is
# pointed at these brokers and mounts the recordings PVC.
pamBroker:
  enabled: false
  guacd:
    image: guacamole/guacd:latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  guacamole:
    image: guacamole/guacamole:latest
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  zitiTunnel:
    image: openziti/ziti-edge-tunnel:latest
    # Secret holding the enrolled #pam-broker-dialers identity (pam-broker.json).
    # When empty an emptyDir is used and you enroll into it out-of-band.
    identitySecret: ""
    # Override if the access-service is reachable at a non-default name.
    bindingsUrl: ""
  db:
    # A Postgres reachable from the cluster with the Guacamole JDBC schema loaded
    # into directDatabase + zitiDatabase. Point at the bundled postgres or a
    # dedicated instance; password comes from secrets.pamGuacDbPassword.
    hostname: openidx-postgresql
    user: guacamole
    directDatabase: guac_direct
    zitiDatabase: guac_ziti
  recordings:
    size: 20Gi
    accessMode: ReadWriteMany
    storageClass: ""

# Admin Console
adminConsole:
  enabled: true
  replicaCount: 2
  image:
    repository: admin-console
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - host: admin.openidx.io
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: admin-console-tls
        hosts:
          - admin.openidx.io
  pdb:
    enabled: true
    maxUnavailable: 1
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Keycloak (legacy/optional). OpenIDX ships its own oauthService as the
# default OIDC provider, so this subchart is disabled by default. Enable it
# only if you want to front OpenIDX with an external Keycloak.
keycloak:
  enabled: false
  auth:
    adminUser: admin
    adminPassword: ""  # Set via secret
  postgresql:
    enabled: false  # Use external PostgreSQL
  externalDatabase:
    host: ""
    port: 5432
    user: keycloak
    password: ""
    database: keycloak

# APISIX
apisix:
  enabled: true
  gateway:
    type: LoadBalancer
  ingress-controller:
    enabled: true
  dashboard:
    enabled: true

# OPA
opa:
  enabled: true
  replicas: 2

# Database connection options (applied to the generated DATABASE_URL secret)
database:
  # TLS mode for the PostgreSQL connection: disable | require | verify-ca | verify-full.
  # Defaults to 'disable' for in-cluster dev. Production MUST set 'require' or stronger —
  # services started with APP_ENV=production refuse to boot when this is 'disable'.
  sslMode: disable

# PostgreSQL
postgresql:
  enabled: true
  auth:
    postgresPassword: ""  # Set via secret
    database: openidx
  primary:
    persistence:
      size: 20Gi

# Redis
redis:
  enabled: true
  auth:
    password: ""  # Set via secret
  master:
    persistence:
      size: 5Gi
  sentinel:
    enabled: false
    masterName: "mymaster"
    # When sentinel.enabled=true, deploy Redis in Sentinel mode for HA failover.
    # Sentinel addresses are auto-discovered from the Helm chart's headless service.

# Elasticsearch
elasticsearch:
  enabled: true
  replicas: 3
  minimumMasterNodes: 2
  volumeClaimTemplate:
    resources:
      requests:
        storage: 30Gi

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true
    adminPassword: ""  # Set via secret

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: api.openidx.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-tls
      hosts:
        - api.openidx.io

# Service Account
serviceAccount:
  create: true
  name: openidx
  annotations: {}

# Pod Security
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Pod anti-affinity — spread replicas across nodes
podAntiAffinity:
  enabled: true
  weight: 100

# Network Policy — zero-trust network segmentation
networkPolicy:
  enabled: false

# TLS for inter-service communication (opt-in)
serviceTLS:
  enabled: false
  # Secret containing tls.crt and tls.key for service certificates
  certSecret: ""
  # Secret containing ca.crt for CA certificate (enables mTLS verification)
  caSecret: ""
