# Development overlay for OpenIDX Kubernetes deployment
# Usage: kubectl apply -k deployments/kubernetes/overlays/development
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: openidx-dev

commonLabels:
  environment: development

# Patches for development-specific configuration
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment

# ConfigMap overrides for development
configMapGenerator:
  - name: openidx-dev-config
    literals:
      - APP_ENV=development
      - LOG_LEVEL=debug
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
