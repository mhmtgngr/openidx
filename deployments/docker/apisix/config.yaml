apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_admin: true
  admin_key:
    - name: admin
      # Sourced from the APISIX_ADMIN_KEY env var (native APISIX 3.x ${{}} substitution).
      key: ${{APISIX_ADMIN_KEY}}
      schema: admin
  port_admin: 9180
  # Only allow the loopback and the Docker bridge pool that covers the
  # openidx-network container IPs. Docker's default bridge/user-defined
  # network pool is 172.16.0.0/12, which is where openidx-network lives.
  # If your daemon is configured with a custom default-address-pool
  # (e.g. 10.x or 192.168.x), add that CIDR here to widen access.
  admin_allow_ip:
    - 127.0.0.1
    - 172.16.0.0/12
  ssl:
    enable: true
    listen:
      - port: 9443

deployment:
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    admin_key:
      - name: admin
        # Sourced from the APISIX_ADMIN_KEY env var (native APISIX 3.x ${{}} substitution).
        key: ${{APISIX_ADMIN_KEY}}
        schema: admin
  etcd:
    host:
      - "http://openidx-etcd:2379"
    prefix: "/apisix"

plugin_attr:
  prometheus:
    export_addr:
      ip: 0.0.0.0
      port: 9091
