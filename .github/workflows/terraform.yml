name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'deployments/terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deployments/terraform/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: fmt & validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - deployments/terraform
          - deployments/terraform/bootstrap
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: ${{ matrix.dir }}

      # -backend=false installs providers/modules without touching the real
      # S3 backend, so validate runs without AWS credentials.
      - name: Init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: ${{ matrix.dir }}

      - name: Validate
        run: terraform validate -no-color
        working-directory: ${{ matrix.dir }}
