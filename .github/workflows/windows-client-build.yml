name: Windows Client Build

# Builds the OpenIDX Windows client (.exe) and packages the MSI. The box/CI
# Linux runners can't build the MSI, so the packaging job runs on windows-latest
# (WiX v5 via `dotnet tool install`). A fast Linux job cross-builds the .exe as
# a smoke check on every relevant push/PR.

on:
  push:
    branches: [main]
    paths: ['agent/**', '.github/workflows/windows-client-build.yml']
    tags: ['agent-v*']
  pull_request:
    paths: ['agent/**', '.github/workflows/windows-client-build.yml']
  workflow_dispatch:
    inputs:
      version:
        description: MSI version (x.y.z)
        type: string
        default: 0.1.0

concurrency:
  group: windows-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast signal on every PR: does the agent cross-compile to Windows?
  smoke-crosscompile:
    name: cross-compile (linux → windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum
      - name: go vet + build (windows target)
        working-directory: agent
        run: |
          go vet ./...
          GOOS=windows GOARCH=amd64 go build ./...
          go test ./internal/... 2>&1 | tail -20

  # Real artifact: build the .exe natively + package the MSI (WiX).
  build-msi:
    name: build .exe + MSI
    runs-on: windows-latest
    needs: smoke-crosscompile
    permissions:
      contents: write # create the release + upload assets on a tag
    # Job-level env so the signing steps' `if:` can read whether a cert secret
    # is configured (step-level env isn't visible to that step's own `if`).
    env:
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # On a tag `agent-v1.2.0`, version = 1.2.0; else the dispatch input.
          if [[ "$GITHUB_REF" == refs/tags/agent-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/agent-v}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build openidx-agent.exe
        working-directory: agent
        shell: bash
        run: |
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${{ steps.ver.outputs.version }} -X main.Commit=${{ github.sha }}" \
            -o dist/openidx-agent.exe ./cmd/openidx-agent

      # Authenticode signing (optional): set WINDOWS_CERT_PFX_BASE64 +
      # WINDOWS_CERT_PASSWORD repo secrets to enable. Decode the cert once and
      # locate signtool (present via the Windows SDK on windows-latest but not
      # on PATH). Skipped entirely when the secret is unset.
      - name: Prepare code-signing
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $st) { throw "signtool.exe not found" }
          "SIGNTOOL=$($st.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "signtool: $($st.FullName)"
          # Trust our (self-signed) cert on the runner so `signtool verify /pa`
          # chain-check passes — mirrors distributing the public cert to Trusted
          # Root on managed endpoints. Machine store when elevated, else the user
          # store (both are consulted during Authenticode chain building).
          try {
            Import-Certificate -FilePath agent/packaging/openidx-codesign.cer -CertStoreLocation Cert:\LocalMachine\Root -ErrorAction Stop | Out-Null
          } catch {
            Import-Certificate -FilePath agent/packaging/openidx-codesign.cer -CertStoreLocation Cert:\CurrentUser\Root | Out-Null
          }

      - name: Sign openidx-agent.exe
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 agent/dist/openidx-agent.exe
          & "$env:SIGNTOOL" verify /pa agent/dist/openidx-agent.exe

      - name: Install WiX
        # Pin WiX v5: v6/v7 require accepting the OSMF EULA at build time
        # (WIX7015), which fails unattended CI. v5 is free and uses the same
        # v4/v5 .wxs schema. Also add the Util extension used by the enroll CA.
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2

      - name: Build MSI
        shell: bash
        run: |
          mkdir -p dist
          wix build agent/packaging/wix/OpenIDX.wxs \
            -ext WixToolset.Util.wixext \
            -d Version=${{ steps.ver.outputs.version }} \
            -d ExePath=agent/dist/openidx-agent.exe \
            -arch x64 \
            -o dist/OpenIDX-${{ steps.ver.outputs.version }}.msi

      # Sign the packaged MSI (contains the already-signed exe). latest.json is
      # generated AFTER this so its sha256 matches the signed MSI.
      - name: Sign MSI
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist/OpenIDX-${{ steps.ver.outputs.version }}.msi"
          & "$env:SIGNTOOL" verify /pa "dist/OpenIDX-${{ steps.ver.outputs.version }}.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openidx-windows-client-${{ steps.ver.outputs.version }}
          path: |
            agent/dist/openidx-agent.exe
            dist/OpenIDX-*.msi
          if-no-files-found: error

      # ---- Release wiring (tags only) ----------------------------------------
      # On an `agent-v*` tag, publish a GitHub Release with the MSI + a
      # latest.json manifest the self-updater polls. Clients set
      #   update_manifest_url = https://github.com/<owner>/<repo>/releases/latest/download/latest.json
      # which always redirects to the newest release's manifest.
      - name: Generate latest.json
        if: steps.ver.outputs.release == 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $msi = "dist/OpenIDX-$ver.msi"
          $sha = (Get-FileHash -Algorithm SHA256 $msi).Hash.ToLower()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/OpenIDX-$ver.msi"
          $manifest = [ordered]@{ version = $ver; url = $url; sha256 = $sha }
          $manifest | ConvertTo-Json | Set-Content -Path dist/latest.json -Encoding utf8
          Get-Content dist/latest.json

      - name: Publish release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenIDX Windows Client ${{ steps.ver.outputs.version }}
          files: |
            dist/OpenIDX-${{ steps.ver.outputs.version }}.msi
            dist/latest.json
          fail_on_unmatched_files: true
