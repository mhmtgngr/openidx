name: Windows Client Build

# Builds the OpenIDX Windows client (.exe) and packages the MSI. The box/CI
# Linux runners can't build the MSI, so the packaging job runs on windows-latest
# (WiX v5 via `dotnet tool install`). A fast Linux job cross-builds the .exe as
# a smoke check on every relevant push/PR.

on:
  push:
    branches: [main]
    paths: ['agent/**', '.github/workflows/windows-client-build.yml']
    tags: ['agent-v*']
  pull_request:
    paths: ['agent/**', '.github/workflows/windows-client-build.yml']
  workflow_dispatch:
    inputs:
      version:
        description: MSI version (x.y.z)
        type: string
        default: 0.1.0

concurrency:
  group: windows-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast signal on every PR: does the agent cross-compile to Windows?
  smoke-crosscompile:
    name: cross-compile (linux → windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum
      - name: go vet + build (windows target)
        working-directory: agent
        run: |
          go vet ./...
          GOOS=windows GOARCH=amd64 go build ./...
          go test ./internal/... 2>&1 | tail -20

  # Real artifact: build the .exe natively + package the MSI (WiX).
  build-msi:
    name: build .exe + MSI
    runs-on: windows-latest
    needs: smoke-crosscompile
    permissions:
      contents: write # create the release + upload assets on a tag
    # Job-level env so the signing steps' `if:` can read whether a cert secret
    # is configured (step-level env isn't visible to that step's own `if`).
    env:
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: agent/go.sum

      # Native deps for the real screen-share build (VP8 encode via libvpx +
      # pkg-config + the mingw C toolchain the CGO binding uses). vcpkg is
      # preinstalled on windows-latest at $VCPKG_INSTALLATION_ROOT. Best-effort:
      # the build step falls back to a pure-Go exe if any of this is unavailable.
      - name: Install libvpx + pkg-config (for screen capture)
        id: nativedeps
        shell: bash
        continue-on-error: true
        run: |
          set -x
          # pkg-config + mingw gcc for the vpx cgo binding.
          choco install -y pkgconfiglite mingw || true
          # libvpx via the preinstalled vcpkg. Use the MINGW triplet — the Go
          # build links with mingw gcc, which cannot read vcpkg's default MSVC
          # (x64-windows) import libs ("file format not recognized"). The mingw
          # triplet builds gcc-linkable libs + pkgconfig.
          VCPKG="${VCPKG_INSTALLATION_ROOT:-C:/vcpkg}"
          "$VCPKG/vcpkg" install libvpx:x64-mingw-dynamic || "$VCPKG/vcpkg" install libvpx:x64-mingw-static
          TRIPLET_DIR="$VCPKG/installed/x64-mingw-dynamic"
          [ -d "$TRIPLET_DIR" ] || TRIPLET_DIR="$VCPKG/installed/x64-mingw-static"
          echo "VCPKG_TRIPLET_DIR=$TRIPLET_DIR" >> "$GITHUB_ENV"
          ls "$TRIPLET_DIR/lib/pkgconfig" || true
          ls "$TRIPLET_DIR/lib" || true

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          # On a tag `agent-v1.2.0`, version = 1.2.0; else the dispatch input.
          if [[ "$GITHUB_REF" == refs/tags/agent-v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/agent-v}" >> "$GITHUB_OUTPUT"
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version || '0.1.0' }}" >> "$GITHUB_OUTPUT"
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build openidx-agent.exe
        working-directory: agent
        shell: bash
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.Version=${{ steps.ver.outputs.version }} -X main.Commit=${{ github.sha }}"

          # Try the real screen-share build first: -tags screenshare needs CGO +
          # libvpx (installed via vcpkg below). If anything about the native
          # toolchain fails, fall back to the pure-Go build so the MSI is never
          # blocked — that build negotiates remote-support sessions and honors
          # input, it just sends no video frames.
          set +e
          echo "Attempting screen-share (VP8 capture) build..."
          # Static-link the MinGW GCC runtime (libwinpthread / libgcc / libstdc++)
          # into the exe. The screenshare build uses CGO via MinGW-w64, which by
          # default DYNAMICALLY links libwinpthread-1.dll — a DLL that only exists
          # on machines with a MinGW/Git toolchain. On a clean Windows box the exe
          # then fails to launch with 0xC0000135 (STATUS_DLL_NOT_FOUND), the
          # service can't start (1920), and the MSI rolls back (1603). Linking the
          # GCC runtime statically removes that external dependency entirely.
          CGO_ENABLED=1 \
          PKG_CONFIG_PATH="$VCPKG_TRIPLET_DIR/lib/pkgconfig" \
          CGO_CFLAGS="-I$VCPKG_TRIPLET_DIR/include" \
          CGO_LDFLAGS="-L$VCPKG_TRIPLET_DIR/lib -static-libgcc -static-libstdc++ -Wl,-Bstatic -lwinpthread -Wl,-Bdynamic" \
            go build -trimpath -tags screenshare -ldflags "$LDFLAGS" \
            -o dist/openidx-agent.exe ./cmd/openidx-agent
          if [ $? -eq 0 ]; then
            echo "SCREENSHARE_BUILD=on" >> "$GITHUB_ENV"
            echo "✓ built WITH real screen capture (VP8)"
            # Copy the libvpx runtime DLL next to the exe (dynamic triplet).
            cp "$VCPKG_TRIPLET_DIR/bin/"*vpx*.dll dist/ 2>/dev/null || \
              cp "$VCPKG_TRIPLET_DIR/lib/"*vpx*.dll dist/ 2>/dev/null || true
            # Belt-and-suspenders: if libwinpthread somehow remained dynamically
            # linked (older MinGW), ship the DLL next to the exe so a clean box
            # still launches. Static linking above normally makes this a no-op.
            for d in /mingw64/bin /c/ProgramData/chocolatey/lib/mingw/tools/install/mingw64/bin; do
              [ -f "$d/libwinpthread-1.dll" ] && cp "$d/libwinpthread-1.dll" dist/ 2>/dev/null && break
            done || true
          else
            echo "::warning::screenshare build failed; falling back to pure-Go (no video capture)"
            CGO_ENABLED=0 go build -trimpath -ldflags "$LDFLAGS" \
              -o dist/openidx-agent.exe ./cmd/openidx-agent
            echo "SCREENSHARE_BUILD=off" >> "$GITHUB_ENV"
          fi
          set -e
          ls -la dist/

      - name: Report build variant
        shell: bash
        run: |
          if [ "${SCREENSHARE_BUILD:-off}" = "on" ]; then
            echo "### ✅ Screen-share build (real VP8 capture)" >> "$GITHUB_STEP_SUMMARY"
            echo "Remote support streams the device screen." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### ⚠️ Pure-Go build (no video capture)" >> "$GITHUB_STEP_SUMMARY"
            echo "Remote support negotiates + honors input, but sends no video (libvpx toolchain unavailable this run)." >> "$GITHUB_STEP_SUMMARY"
          fi

      # Authenticode signing (optional): set WINDOWS_CERT_PFX_BASE64 +
      # WINDOWS_CERT_PASSWORD repo secrets to enable. Decode the cert once and
      # locate signtool (present via the Windows SDK on windows-latest but not
      # on PATH). Skipped entirely when the secret is unset.
      - name: Prepare code-signing
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $st = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $st) { throw "signtool.exe not found" }
          "SIGNTOOL=$($st.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "signtool: $($st.FullName)"
          # Trust our (self-signed) cert on the runner so `signtool verify /pa`
          # chain-check passes — mirrors distributing the public cert to Trusted
          # Root on managed endpoints. Machine store when elevated, else the user
          # store (both are consulted during Authenticode chain building).
          try {
            Import-Certificate -FilePath agent/packaging/openidx-codesign.cer -CertStoreLocation Cert:\LocalMachine\Root -ErrorAction Stop | Out-Null
          } catch {
            Import-Certificate -FilePath agent/packaging/openidx-codesign.cer -CertStoreLocation Cert:\CurrentUser\Root | Out-Null
          }

      - name: Sign openidx-agent.exe
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 agent/dist/openidx-agent.exe
          & "$env:SIGNTOOL" verify /pa agent/dist/openidx-agent.exe

      - name: Install WiX
        # Pin WiX v5: v6/v7 require accepting the OSMF EULA at build time
        # (WIX7015), which fails unattended CI. v5 is free and uses the same
        # v4/v5 .wxs schema. Also add the Util extension used by the enroll CA.
        run: |
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.Util.wixext/5.0.2

      - name: Build MSI
        shell: bash
        run: |
          mkdir -p dist
          # Include the libvpx runtime DLL in the MSI only when the screenshare
          # build produced one (pass -d VpxDll=<path> so the WiX <?ifdef?> fires).
          VPX_ARG=""
          VPX_DLL="$(ls agent/dist/vpx*.dll 2>/dev/null | head -1 || true)"
          if [ -n "$VPX_DLL" ]; then
            VPX_ARG="-d VpxDll=$VPX_DLL"
            echo "Bundling libvpx runtime: $VPX_DLL"
          fi
          # Include the MinGW pthread runtime only if the build shipped it as a
          # fallback (normally it's static-linked, so this is absent).
          PTHREAD_ARG=""
          PTHREAD_DLL="$(ls agent/dist/libwinpthread*.dll 2>/dev/null | head -1 || true)"
          if [ -n "$PTHREAD_DLL" ]; then
            PTHREAD_ARG="-d PthreadDll=$PTHREAD_DLL"
            echo "Bundling MinGW pthread runtime: $PTHREAD_DLL"
          fi
          wix build agent/packaging/wix/OpenIDX.wxs \
            -ext WixToolset.Util.wixext \
            -d Version=${{ steps.ver.outputs.version }} \
            -d ExePath=agent/dist/openidx-agent.exe \
            $VPX_ARG \
            $PTHREAD_ARG \
            -arch x64 \
            -o dist/OpenIDX-${{ steps.ver.outputs.version }}.msi

      # Sign the packaged MSI (contains the already-signed exe). latest.json is
      # generated AFTER this so its sha256 matches the signed MSI.
      - name: Sign MSI
        if: ${{ env.WINDOWS_CERT_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          & "$env:SIGNTOOL" sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_CERT_PASSWORD" `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "dist/OpenIDX-${{ steps.ver.outputs.version }}.msi"
          & "$env:SIGNTOOL" verify /pa "dist/OpenIDX-${{ steps.ver.outputs.version }}.msi"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openidx-windows-client-${{ steps.ver.outputs.version }}
          path: |
            agent/dist/openidx-agent.exe
            dist/OpenIDX-*.msi
          if-no-files-found: error

      # ---- Release wiring (tags only) ----------------------------------------
      # On an `agent-v*` tag, publish a GitHub Release with the MSI + a
      # latest.json manifest the self-updater polls. Clients set
      #   update_manifest_url = https://github.com/<owner>/<repo>/releases/latest/download/latest.json
      # which always redirects to the newest release's manifest.
      - name: Generate latest.json
        if: steps.ver.outputs.release == 'true'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          $msi = "dist/OpenIDX-$ver.msi"
          $sha = (Get-FileHash -Algorithm SHA256 $msi).Hash.ToLower()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/OpenIDX-$ver.msi"
          $manifest = [ordered]@{ version = $ver; url = $url; sha256 = $sha }
          $manifest | ConvertTo-Json | Set-Content -Path dist/latest.json -Encoding utf8
          Get-Content dist/latest.json

      - name: Publish release
        if: steps.ver.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenIDX Windows Client ${{ steps.ver.outputs.version }}
          files: |
            dist/OpenIDX-${{ steps.ver.outputs.version }}.msi
            dist/latest.json
          fail_on_unmatched_files: true
