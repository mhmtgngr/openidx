name: Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  # Images publish under the repo owner's GHCR namespace, e.g.
  # ghcr.io/mhmtgngr/openidx/identity-service
  IMAGE_PREFIX: ghcr.io/mhmtgngr/openidx

jobs:
  build:
    name: build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: identity-service
            dockerfile: deployments/docker/Dockerfile.identity-service
          - service: governance-service
            dockerfile: deployments/docker/Dockerfile.governance-service
          - service: provisioning-service
            dockerfile: deployments/docker/Dockerfile.provisioning-service
          - service: audit-service
            dockerfile: deployments/docker/Dockerfile.audit-service
          - service: admin-api
            dockerfile: deployments/docker/Dockerfile.admin-api
          - service: oauth-service
            dockerfile: deployments/docker/Dockerfile.oauth-service
          - service: gateway-service
            dockerfile: deployments/docker/Dockerfile.gateway-service
          - service: access-service
            dockerfile: deployments/docker/Dockerfile.access-service
          # The admin-console image builds the `production` (nginx) stage and
          # needs the repo root as context to copy the nginx config.
          - service: admin-console
            dockerfile: deployments/docker/Dockerfile.admin-console
            target: production

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate (and therefore push) for non-PR events. PRs from
      # forks can't access packages:write, so PR runs build-only to validate
      # the Dockerfile without publishing.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=OpenIDX ${{ matrix.service }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}

      # Multi-arch (amd64+arm64) on push so the published manifest serves both
      # platforms from one tag. On PRs build a single arch and load it locally
      # so Trivy can scan it without publishing.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          # Stamp the binary version: the release tag on tag builds, otherwise
          # the commit SHA. Surfaces in each service's /health response.
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}

      # Image vulnerability scan. Reported to the Security tab; non-blocking so
      # unfixable upstream CVEs don't turn the build red (gating happens in the
      # nightly Security Scanning workflow).
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'docker-image-${{ matrix.service }}'

  # Re-tag the pushed :<sha> manifests with semver tags on a vX.Y.Z release.
  release-tag:
    name: Tag Release Images
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=$(echo "$VERSION" | cut -d. -f1,2)" >> "$GITHUB_OUTPUT"
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> "$GITHUB_OUTPUT"

      - name: Re-tag images with version
        run: |
          for service in identity-service governance-service provisioning-service \
                         audit-service admin-api oauth-service gateway-service \
                         access-service admin-console; do
            echo "Tagging $service ${{ steps.version.outputs.version }}..."
            docker buildx imagetools create \
              --tag "${{ env.IMAGE_PREFIX }}/$service:${{ steps.version.outputs.version }}" \
              --tag "${{ env.IMAGE_PREFIX }}/$service:${{ steps.version.outputs.major_minor }}" \
              --tag "${{ env.IMAGE_PREFIX }}/$service:${{ steps.version.outputs.major }}" \
              --tag "${{ env.IMAGE_PREFIX }}/$service:stable" \
              "${{ env.IMAGE_PREFIX }}/$service:${{ github.sha }}"
          done

  docker-status-check:
    name: Docker Build Status
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    timeout-minutes: 5
    steps:
      - name: Check build result
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Docker builds failed"
            exit 1
          fi
          echo "All Docker builds passed"
