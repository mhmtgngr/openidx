name: Android CI

# Path-filtered: this workflow does the heavy lifting (~5-10 min including
# SDK download + Gradle resolution) so we keep it scoped to the Android
# project. Changes elsewhere in the repo don't trigger it.
on:
  push:
    branches: [main, dev]
    paths:
      - 'agent-android/**'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'agent-android/**'
      - '.github/workflows/ci-android.yml'

permissions:
  contents: read

# Cancel superseded runs on the same ref so a fast-follow push doesn't burn
# minutes on a now-stale build.
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: agent-android

env:
  GRADLE_VERSION: '8.7'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  build:
    name: Build & lint Android client
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Provisions the Android SDK + accepts licenses + makes the platform
      # and build-tools versions we declare available to Gradle. Caches
      # under ~/.android by default.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-${{ env.ANDROID_COMPILE_SDK }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}
            platform-tools

      # The repo intentionally does not commit the Gradle wrapper jar.
      # setup-gradle installs the pinned distribution and exposes it on
      # PATH, then handles dependency caching across runs.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          # Cache key derived from build scripts so dependency changes bust
          # the cache automatically.
          cache-read-only: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}

      - name: Print versions
        run: |
          java -version
          gradle --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$ANDROID_HOME/platforms" || true

      # Assemble the debug APK + library AARs. Module dependencies wire
      # core/ and posture-android/ implicitly so :app:assembleDebug covers
      # everything we ship today.
      - name: Assemble debug APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      # Lint runs the Android Gradle Plugin's own static analysis. Allowed
      # to find issues (warnings) but a fatal error fails the build —
      # matches AGP defaults.
      - name: Lint
        run: gradle :app:lintDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openidx-agent-debug-${{ github.sha }}
          path: agent-android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: agent-android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  unit-tests:
    name: JVM unit tests (core + posture)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run in parallel with the heavier build job — unit tests don't need
    # the Android SDK and finish fast.
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platforms;android-${{ env.ANDROID_COMPILE_SDK }}
            build-tools;${{ env.ANDROID_BUILD_TOOLS }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Run unit tests
        run: |
          gradle :core:test :posture-android:test --no-daemon || true
          # The "|| true" is intentional during Phase 1 bootstrap — neither
          # module has tests yet. Remove once we add the first test class
          # so missing tests fail the build.
