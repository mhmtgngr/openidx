name: Release

on:
  push:
    tags: ['v*']
  # Dispatchable path for environments that cannot push tags (e.g. remote
  # sessions with branch-scoped git credentials): the release action below
  # creates the tag at the chosen commit when it doesn't exist yet.
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag (e.g. v1.16.0)"
        required: true

permissions:
  contents: write
  packages: write

env:
  # Tag being released: the pushed tag, or the dispatch input.
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate version input
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.].+)?$ ]]; then
            echo "::error::version must look like v1.2.3, got '$RELEASE_VERSION'"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Build Linux binaries
        run: |
          for service in identity-service governance-service provisioning-service audit-service gateway-service admin-api oauth-service access-service; do
            GOOS=linux GOARCH=amd64 go build -ldflags "-X main.Version=${RELEASE_VERSION} -X main.CommitHash=$(git rev-parse --short HEAD)" \
              -o dist/${service}-linux-amd64 ./cmd/$service
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && github.sha || '' }}
          generate_release_notes: true
          files: dist/*
