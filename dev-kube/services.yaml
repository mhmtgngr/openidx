# OpenIDX microservices deployments
---
# Identity Service
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: openidx-dev
  labels:
    app.kubernetes.io/name: identity-service
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app.kubernetes.io/name: identity-service

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: openidx-dev
  labels:
    app.kubernetes.io/name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: identity-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: identity-service
    spec:
      containers:
        - name: identity-service
          image: openidx-dev/identity-service:dev
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: LOG_LEVEL
            - name: DATABASE_HOST
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: DATABASE_HOST
            - name: DATABASE_PORT
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: DATABASE_PORT
            - name: DATABASE_NAME
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: DATABASE_NAME
            - name: DATABASE_USER
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openidx-secrets
                  key: POSTGRES_PASSWORD
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openidx-secrets
                  key: REDIS_PASSWORD
            - name: OPA_URL
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: OPA_URL
            - name: OAUTH_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: OAUTH_ISSUER
            - name: OAUTH_JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: openidx-config
                  key: OAUTH_JWKS_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

