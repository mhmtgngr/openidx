---
# Admin Console (Frontend)
apiVersion: v1
kind: Service
metadata:
  name: admin-console
  namespace: openidx-dev
  labels:
    app.kubernetes.io/name: admin-console
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: admin-console

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-console
  namespace: openidx-dev
  labels:
    app.kubernetes.io/name: admin-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-console
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-console
    spec:
      containers:
        - name: admin-console
          image: openidx-dev/admin-console:dev
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: VITE_API_URL
              value: http://localhost:8088
            - name: VITE_OAUTH_URL
              value: http://localhost:8006
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
