# Environment variables secret template for development
# Copy this file to secrets-local.yaml and fill in the values
# Or generate using: ./scripts/generate-secrets.sh

apiVersion: v1
kind: Secret
metadata:
  name: openidx-secrets
  namespace: openidx-dev
type: Opaque
stringData:
  # Database credentials
  POSTGRES_PASSWORD: "changeme-postgres-password"
  DATABASE_URL: "postgres://openidx:changeme-postgres-password@postgres:5432/openidx?sslmode=disable"

  # Redis credentials
  REDIS_PASSWORD: "changeme-redis-password"
  REDIS_URL: "redis://:changeme-redis-password@redis:6379"

  # Security secrets (REPLACE WITH STRONG RANDOM VALUES IN PRODUCTION)
  JWT_SECRET: "changeme-jwt-secret-min-32-characters"
  ENCRYPTION_KEY: "changeme-32-byte-key-for-aes256!!!"

  # OAuth/OIDC
  OAUTH_ISSUER: "http://oauth-service.openidx-dev.svc.cluster.local:8006"
  OAUTH_JWKS_URL: "http://oauth-service.openidx-dev.svc.cluster.local:8006/.well-known/jwks.json"
  OAUTH_CLIENT_ID: "admin-console"
  OAUTH_CLIENT_SECRET: "changeme-oauth-client-secret"

  # SMTP (optional for development)
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "noreply@openidx.local"

  # Service URLs (internal cluster communication)
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  OPA_URL: "http://opa:8281"

  # Frontend environment
  VITE_API_URL: "http://localhost:8088"
  VITE_OAUTH_URL: "http://localhost:8006"
