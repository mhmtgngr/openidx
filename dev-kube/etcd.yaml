# etcd for APISIX configuration storage
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: openidx-dev
  labels:
    app.kubernetes.io/component: etcd
spec:
  type: ClusterIP
  ports:
    - port: 2379
      targetPort: 2379
      name: client
    - port: 2380
      targetPort: 2380
      name: peer
  selector:
    app.kubernetes.io/component: etcd

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
  namespace: openidx-dev
  labels:
    app.kubernetes.io/component: etcd
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/component: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.12
          command:
            - /usr/local/bin/etcd
            - --data-dir=/etcd-data
            - --name=etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd:2379
            - --listen-peer-urls=http://0.0.0.0:2380
          ports:
            - containerPort: 2379
              name: client
            - containerPort: 2380
              name: peer
          volumeMounts:
            - name: etcd-data
              mountPath: /etcd-data
          livenessProbe:
            exec:
              command:
                - etcdctl
                - endpoint
                - health
                - --endpoints=http://localhost:2379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - etcdctl
                - endpoint
                - health
                - --endpoints=http://localhost:2379
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: etcd-data
          persistentVolumeClaim:
            claimName: etcd-pvc
