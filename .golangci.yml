version: "2"

# Pragmatic baseline (golangci-lint v2). golangci-lint v1 can't analyze a
# go1.25 module, so lint was silently broken and a backlog of findings
# accumulated. Deferred to a dedicated cleanup:
#   - errcheck / unused / staticcheck (50+ each)
#   - misspell (mostly British "cancelled"/"behaviour" which are pervasive and
#     used as status enum values — auto-"fixing" would be a breaking change)
#   - goimports (import-grouping churn; separate cleanup)
# gofmt IS enforced (the whole tree was formatted; go1.25 and the
# golangci-lint binary's gofmt agree). This curated set keeps lint green and
# meaningful (vet correctness, HTTP body leaks, redundant conversions, gofmt).
run:
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - bodyclose
    - ineffassign
    - unconvert
  exclusions:
    generated: lax
    paths:
      - node_modules
      - ^deploy/
      - docs/api/examples
    rules:
      # In tests these are low-signal (leaked bodies / redundant casts don't
      # affect production behavior); keep them enforced in non-test code.
      - path: _test\.go
        linters:
          - bodyclose
          - ineffassign
          - unconvert

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - node_modules
