version: "2"

# Pragmatic baseline (golangci-lint v2). golangci-lint v1 can't analyze a
# go1.25 module, so lint was silently broken and a backlog of findings
# accumulated. Deferred to a dedicated cleanup:
#   - errcheck (1000+ findings, mostly intentional fire-and-forget / optional
#     request-body binds; not worth blanket enforcement for v1)
#   - misspell (mostly British "cancelled"/"behaviour" which are pervasive and
#     used as status enum values — auto-"fixing" would be a breaking change)
#   - goimports (import-grouping churn; separate cleanup)
# gofmt IS enforced (the whole tree was formatted; go1.25 and the
# golangci-lint binary's gofmt agree). staticcheck is enforced for its
# bug-class (SA*) checks; the stylistic groups (S/ST/QF) plus two SA checks are
# disabled (see settings below). unused is enforced: dead code was removed; a
# handful of built-but-unwired features (session-timeout checks, SAML SLO
# tracking, proxy hop-by-hop stripping, audit-stream SIEM config) are kept
# behind //nolint:unused with TODO(unwired) markers pending a wire-or-drop call.
# This curated set keeps lint green and meaningful (vet correctness, HTTP body
# leaks, redundant conversions, staticcheck bug detection, dead-code, gofmt).
run:
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - govet
    - bodyclose
    - ineffassign
    - unconvert
    - staticcheck
    - unused
  settings:
    staticcheck:
      # Enforce the SA* bug-class only. The S/ST/QF groups are stylistic
      # (simplifications, capitalized error strings, quickfixes) — deferred to a
      # separate pass. Two SA checks are also disabled with cause:
      #   SA9003: 8 empty branches are intentional placeholders for
      #           unimplemented features (metrics delta tracking, SCIM email
      #           PATCH, RSA-exponent warning, Ziti existence check).
      #   SA5008: 4 SAML metadata XML struct-tag name conflicts — likely a real
      #           marshaling bug, but fixing needs SAML-schema review; tracked.
      checks:
        - all
        - -S1*
        - -ST1*
        - -QF1*
        - -SA9003
        - -SA5008
  exclusions:
    generated: lax
    paths:
      - node_modules
      - ^deploy/
      - docs/api/examples
    rules:
      # In tests these are low-signal (leaked bodies / redundant casts /
      # simplifications don't affect production behavior); keep them enforced in
      # non-test code.
      - path: _test\.go
        linters:
          - bodyclose
          - ineffassign
          - unconvert
          - staticcheck
          - unused

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - node_modules
