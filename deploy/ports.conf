# ═══════════════════════════════════════════════════════════════
# OpenIDX Port Configuration
# ═══════════════════════════════════════════════════════════════
# This file defines all ports used by OpenIDX services.
# Modify these values to avoid conflicts with other services.
#
# Port Status (as of 2026-02-27):
#   3000 - AVAILABLE ✓
#   3001 - IN USE (openpam-frontend)
#   5173 - IN USE (dev server)
#   8080 - IN USE (Guacamole/Tomcat)
#   8081 - AVAILABLE ✓
#   8088 - AVAILABLE ✓
#   8443 - AVAILABLE ✓
#   9000 - IN USE (MinIO)
#   9001 - AVAILABLE ✓
# ═══════════════════════════════════════════════════════════════

# ────────────────────────────────────────────────────────────────
# FRONTEND PORTS
# ────────────────────────────────────────────────────────────────

# Main frontend (nginx/static serve)
FRONTEND_PORT=3000

# Admin console dev server (Vite)
DEV_PORT=5173

# ────────────────────────────────────────────────────────────────
# API GATEWAY PORTS
# ────────────────────────────────────────────────────────────────

# APISIX Gateway
GATEWAY_HTTP_PORT=8088
GATEWAY_HTTPS_PORT=8443

# Alternative frontend port (if 3000/8080 conflicts)
FRONTEND_ALT_PORT=8081

# ────────────────────────────────────────────────────────────────
# CORE SERVICE PORTS (Internal - typically not changed)
# ────────────────────────────────────────────────────────────────

# Identity Service
IDENTITY_PORT=8001

# Governance Service
GOVERNANCE_PORT=8002

# Provisioning Service (SCIM)
PROVISIONING_PORT=8003

# Audit Service
AUDIT_PORT=8004

# Admin API
ADMIN_API_PORT=8005

# OAuth/OIDC Service
OAUTH_PORT=8006

# Access Service
ACCESS_PORT=8007

# Gateway Service
GATEWAY_SERVICE_PORT=8008

# Demo Application
DEMO_APP_PORT=8090

# ────────────────────────────────────────────────────────────────
# INFRASTRUCTURE PORTS
# ────────────────────────────────────────────────────────────────

# PostgreSQL
POSTGRES_PORT=5432

# Redis
REDIS_PORT=6379

# Elasticsearch
ELASTICSEARCH_PORT=9200

# etcd
ETCD_CLIENT_PORT=2379
ETCD_PEER_PORT=2380

# ────────────────────────────────────────────────────────────────
# EXTERNAL SERVICES
# ────────────────────────────────────────────────────────────────

# Guacamole (RDP/VNC gateway)
GUACAMOLE_PORT=8085

# Mailpit (email testing)
MAILPIT_SMTP_PORT=1025
MAILPIT_WEB_PORT=8025

# Ziti Controller (BrowZer)
ZITI_CTRL_PORT=1280
